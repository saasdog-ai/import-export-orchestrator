name: Deploy to AWS

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

permissions:
  id-token: write  # Required for OIDC
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate AWS_ROLE_ARN secret
        run: |
          if [ -z "${{ secrets.AWS_ROLE_ARN }}" ]; then
            echo "❌ Error: AWS_ROLE_ARN secret is not set"
            echo "Please configure it in: Settings → Secrets and variables → Actions"
            echo "Or in: Settings → Environments → ${{ github.event.inputs.environment || 'dev' }} → Secrets"
            exit 1
          fi
          echo "✅ AWS_ROLE_ARN secret is configured"

      - name: Configure AWS credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
          role-session-name: GitHubActions-Deploy-${{ github.run_id }}
          # No access key or secret key needed - uses OIDC

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.0

      - name: Validate DATABASE_PASSWORD secret
        run: |
          if [ -z "${{ secrets.DATABASE_PASSWORD }}" ]; then
            echo "❌ Error: DATABASE_PASSWORD secret is not set"
            echo "Please configure it in: Settings → Secrets and variables → Actions"
            echo "Or in: Settings → Environments → ${{ github.event.inputs.environment || 'dev' }} → Secrets"
            exit 1
          fi
          echo "✅ DATABASE_PASSWORD secret is configured"

      - name: Create terraform.tfvars from example
        working-directory: ./infra/aws/terraform
        run: |
          if [ ! -f terraform.tfvars ]; then
            echo "Creating terraform.tfvars from example..."
            cp terraform.tfvars.example terraform.tfvars
            echo "✅ Created terraform.tfvars"
          else
            echo "✅ terraform.tfvars already exists"
          fi
          # Format the file to ensure it passes format check
          terraform fmt terraform.tfvars

      - name: Terraform Init
        working-directory: ./infra/aws/terraform
        env:
          TF_VAR_github_repository: ${{ github.repository }}
          TF_VAR_environment: ${{ github.event.inputs.environment || 'dev' }}
        run: terraform init

      - name: Terraform Format Check
        working-directory: ./infra/aws/terraform
        run: |
          # Format check only .tf files (exclude .tfvars files)
          # terraform.tfvars is generated and formatted in previous step
          terraform fmt -check || {
            echo "❌ Format check failed for .tf files"
            echo "Run 'terraform fmt' to fix formatting issues"
            exit 1
          }
          echo "✅ All Terraform files are properly formatted"

      - name: Terraform Validate
        working-directory: ./infra/aws/terraform
        run: terraform validate

      - name: Import existing resources (if they exist)
        working-directory: ./infra/aws/terraform
        env:
          TF_VAR_github_repository: ${{ github.repository }}
          TF_VAR_environment: ${{ github.event.inputs.environment || 'dev' }}
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID || '429763994533' }}
        continue-on-error: true
        run: |
          echo "🔍 Attempting to import existing resources..."
          
          # Get account ID from AWS if not provided
          if [ -z "$AWS_ACCOUNT_ID" ]; then
            AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          fi
          
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          PROJECT_NAME="import-export-orchestrator"
          
          # Import ECR repository
          terraform import aws_ecr_repository.app $PROJECT_NAME 2>/dev/null || echo "⚠️  ECR repository already imported or doesn't exist"
          
          # Import IAM roles
          terraform import aws_iam_role.ecs_task_execution ${PROJECT_NAME}-ecs-task-execution-${ENV} 2>/dev/null || echo "⚠️  ECS task execution role already imported or doesn't exist"
          terraform import aws_iam_role.ecs_task ${PROJECT_NAME}-ecs-task-${ENV} 2>/dev/null || echo "⚠️  ECS task role already imported or doesn't exist"
          
          # Import CloudWatch log group
          terraform import aws_cloudwatch_log_group.ecs /ecs/${PROJECT_NAME}-${ENV} 2>/dev/null || echo "⚠️  CloudWatch log group already imported or doesn't exist"
          
          # Import S3 buckets
          terraform import aws_s3_bucket.exports ${PROJECT_NAME}-exports-${ENV}-${AWS_ACCOUNT_ID} 2>/dev/null || echo "⚠️  Exports S3 bucket already imported or doesn't exist"
          terraform import aws_s3_bucket.terraform_state ${PROJECT_NAME}-terraform-state-${ENV}-${AWS_ACCOUNT_ID} 2>/dev/null || echo "⚠️  Terraform state S3 bucket already imported or doesn't exist"
          
          # Import DynamoDB table
          terraform import aws_dynamodb_table.terraform_state_lock ${PROJECT_NAME}-terraform-state-lock-${ENV} 2>/dev/null || echo "⚠️  DynamoDB table already imported or doesn't exist"
          
          # Import RDS resources
          terraform import aws_db_subnet_group.main ${PROJECT_NAME}-db-subnet-group-${ENV} 2>/dev/null || echo "⚠️  DB subnet group already imported or doesn't exist"
          # Get the actual parameter group name (it may have a different format)
          PARAM_GROUP_NAME=$(aws rds describe-db-parameter-groups --query "DBParameterGroups[?contains(DBParameterGroupName, '${PROJECT_NAME}') && contains(DBParameterGroupName, '${ENV}')].DBParameterGroupName" --output text 2>/dev/null | head -1)
          if [ -n "$PARAM_GROUP_NAME" ]; then
            terraform import aws_db_parameter_group.main $PARAM_GROUP_NAME 2>/dev/null || echo "⚠️  DB parameter group already imported or doesn't exist"
          else
            echo "⚠️  DB parameter group not found, will be created"
          fi
          
          # Import OIDC provider (account-wide, may already exist)
          OIDC_ARN=$(aws iam list-open-id-connect-providers --query "OpenIDConnectProviderList[?contains(Arn, 'token.actions.githubusercontent.com')].Arn" --output text 2>/dev/null | head -1)
          if [ -n "$OIDC_ARN" ]; then
            terraform import aws_iam_openid_connect_provider.github $OIDC_ARN 2>/dev/null || echo "⚠️  OIDC provider already imported or doesn't exist"
          else
            echo "⚠️  OIDC provider not found, will be created"
          fi
          
          echo "✅ Import step completed (some resources may not exist yet, which is fine)"

      - name: Terraform Plan
        working-directory: ./infra/aws/terraform
        env:
          TF_VAR_database_password: ${{ secrets.DATABASE_PASSWORD }}
          TF_VAR_github_repository: ${{ github.repository }}
          TF_VAR_environment: ${{ github.event.inputs.environment || 'dev' }}
        run: |
          echo "🔍 Running terraform plan..."
          terraform plan \
            -var-file="terraform.tfvars" \
            -out=tfplan || {
              echo "❌ Terraform plan failed"
              echo "Checking for common issues..."
              terraform validate || echo "Validation failed"
              exit 1
            }
          echo "✅ Terraform plan completed successfully"

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        working-directory: ./infra/aws/terraform
        env:
          TF_VAR_database_password: ${{ secrets.DATABASE_PASSWORD }}
          TF_VAR_github_repository: ${{ github.repository }}
          TF_VAR_environment: ${{ github.event.inputs.environment || 'dev' }}
        run: |
          echo "🚀 Applying Terraform changes..."
          terraform apply -auto-approve tfplan || {
            echo "❌ Terraform apply failed"
            echo "Check the error messages above for details"
            exit 1
          }
          echo "✅ Terraform apply completed successfully"

      - name: Output Deployment Info
        if: github.ref == 'refs/heads/main'
        working-directory: ./infra/aws/terraform
        run: |
          echo "✅ Deployment completed!"
          echo ""
          echo "📋 Deployment Information:"
          terraform output -json || echo "⚠️  Some outputs may not be available"
          echo ""
          if terraform output -raw alb_dns_name > /dev/null 2>&1; then
            echo "🌐 ALB DNS: $(terraform output -raw alb_dns_name)"
          fi
          if terraform output -raw ecs_cluster_name > /dev/null 2>&1; then
            echo "📦 ECS Cluster: $(terraform output -raw ecs_cluster_name)"
          fi
          if terraform output -raw ecr_repository_url > /dev/null 2>&1; then
            echo "🐳 ECR Repository: $(terraform output -raw ecr_repository_url)"
          fi

