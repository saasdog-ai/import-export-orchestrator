name: Deploy to AWS

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

permissions:
  id-token: write  # Required for OIDC
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate AWS_ROLE_ARN secret
        run: |
          if [ -z "${{ secrets.AWS_ROLE_ARN }}" ]; then
            echo "❌ Error: AWS_ROLE_ARN secret is not set"
            echo "Please configure it in: Settings → Secrets and variables → Actions"
            echo "Or in: Settings → Environments → ${{ github.event.inputs.environment || 'dev' }} → Secrets"
            exit 1
          fi
          echo "✅ AWS_ROLE_ARN secret is configured"

      - name: Configure AWS credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
          role-session-name: GitHubActions-Deploy-${{ github.run_id }}
          # No access key or secret key needed - uses OIDC

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.0

      - name: Validate DATABASE_PASSWORD secret
        run: |
          if [ -z "${{ secrets.DATABASE_PASSWORD }}" ]; then
            echo "❌ Error: DATABASE_PASSWORD secret is not set"
            echo "Please configure it in: Settings → Secrets and variables → Actions"
            echo "Or in: Settings → Environments → ${{ github.event.inputs.environment || 'dev' }} → Secrets"
            exit 1
          fi
          echo "✅ DATABASE_PASSWORD secret is configured"

      - name: Create terraform.tfvars from example
        working-directory: ./infra/aws/terraform
        run: |
          if [ ! -f terraform.tfvars ]; then
            echo "Creating terraform.tfvars from example..."
            cp terraform.tfvars.example terraform.tfvars
            echo "✅ Created terraform.tfvars"
          else
            echo "✅ terraform.tfvars already exists"
          fi
          # Format the file to ensure it passes format check
          terraform fmt terraform.tfvars

      - name: Terraform Init
        working-directory: ./infra/aws/terraform
        env:
          TF_VAR_github_repository: ${{ github.repository }}
          TF_VAR_environment: ${{ github.event.inputs.environment || 'dev' }}
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID || '429763994533' }}
        run: |
          # Configure backend for remote state (S3 + DynamoDB)
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          ACCOUNT_ID="${AWS_ACCOUNT_ID:-429763994533}"
          terraform init \
            -backend-config="bucket=import-export-orchestrator-terraform-state-${ENV}-${ACCOUNT_ID}" \
            -backend-config="key=terraform.tfstate" \
            -backend-config="region=us-east-1" \
            -backend-config="encrypt=true" \
            -backend-config="dynamodb_table=import-export-orchestrator-terraform-state-lock-${ENV}"

      - name: Terraform Format Check
        working-directory: ./infra/aws/terraform
        run: |
          # Format check only .tf files (exclude .tfvars files)
          # terraform.tfvars is generated and formatted in previous step
          terraform fmt -check || {
            echo "❌ Format check failed for .tf files"
            echo "Run 'terraform fmt' to fix formatting issues"
            exit 1
          }
          echo "✅ All Terraform files are properly formatted"

      - name: Terraform Validate
        working-directory: ./infra/aws/terraform
        run: terraform validate

      - name: Import, Plan, and Apply Terraform
        working-directory: ./infra/aws/terraform
        env:
          TF_VAR_database_password: ${{ secrets.DATABASE_PASSWORD }}
          TF_VAR_github_repository: ${{ github.repository }}
          TF_VAR_environment: ${{ github.event.inputs.environment || 'dev' }}
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID || '429763994533' }}
        run: |
          # Step 1: Import existing resources (if they exist)
          echo "🔍 Step 1: Attempting to import existing resources..."
          
          # Get account ID from AWS if not provided (with timeout)
          if [ -z "$AWS_ACCOUNT_ID" ]; then
            AWS_ACCOUNT_ID=$(timeout 10 aws sts get-caller-identity --query Account --output text 2>/dev/null || echo "429763994533")
          fi
          
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          PROJECT_NAME="import-export-orchestrator"
          
          # Backend is already configured in the init step, so state will persist
          echo "Current state before imports:"
          terraform state list 2>/dev/null | head -20 || echo "  (no resources in state yet - this is normal for first run)"
          echo ""
          
          # Simplified import function that handles state persistence correctly
          import_resource() {
            local resource=$1
            local id=$2
            local name=$3
            echo "  → Importing $name..."
            
            # Check if resource already exists in state
            if terraform state list 2>/dev/null | grep -q "^${resource}$"; then
              echo "    ✅ $name already in state, skipping"
              return 0
            fi
            
            # Import WITHOUT -target to ensure state is properly written to backend
            # Validation errors will occur, but we'll catch them and verify import succeeded
            local import_output
            import_output=$(timeout 15 terraform import -input=false -lock=false $resource "$id" 2>&1)
            local import_exit=$?
            
            # Check for success indicators - these mean import succeeded regardless of exit code
            local import_succeeded=false
            if echo "$import_output" | grep -qE "(Import prepared!|Refreshing state|aws_.*: Importing from ID)"; then
              import_succeeded=true
            fi
            
            # If exit code is 0, import definitely succeeded
            if [ $import_exit -eq 0 ]; then
              import_succeeded=true
            fi
            
            # If import succeeded, verify it's in state
            if [ "$import_succeeded" = true ]; then
              # Verify resource is in state
              if terraform state list 2>/dev/null | grep -q "^${resource}$"; then
                echo "    ✅ $name imported successfully"
                return 0
              fi
              
              # Try state show as fallback
              if terraform state show "$resource" >/dev/null 2>&1; then
                echo "    ✅ $name imported successfully"
                return 0
              fi
              
              # If we saw success indicators, import succeeded (state will be used by plan/apply)
              echo "    ✅ $name import completed"
              return 0
            fi
            
            # Check for validation errors that occur AFTER successful import
            if echo "$import_output" | grep -qE "(Error: Invalid count|Error: reading.*policy|Error: reading.*backups|Error: reading.*parameters)"; then
              # Validation error occurred - check if import actually succeeded
              if terraform state list 2>/dev/null | grep -q "^${resource}$" || terraform state show "$resource" >/dev/null 2>&1; then
                echo "    ✅ $name imported (validation errors ignored)"
                return 0
              fi
            fi
            
            # Import failed - show full output for debugging
            echo "    ⚠️  $name import failed"
            echo "    Exit code: $import_exit"
            echo "    Error: $(echo "$import_output" | grep -E "Error:" | head -1 || echo "Unknown error")"
            echo "    Full output (first 20 lines):"
            echo "$import_output" | head -20 | sed 's/^/      /'
            return 1
          }
          
          # Import resources with timeouts (run sequentially to avoid state conflicts)
          import_resource "aws_ecr_repository.app" "$PROJECT_NAME" "ECR repository"
          import_resource "aws_iam_role.ecs_task_execution" "${PROJECT_NAME}-ecs-task-execution-${ENV}" "ECS task execution role"
          import_resource "aws_iam_role.ecs_task" "${PROJECT_NAME}-ecs-task-${ENV}" "ECS task role"
          import_resource "aws_cloudwatch_log_group.ecs" "/ecs/${PROJECT_NAME}-${ENV}" "CloudWatch log group"
          import_resource "aws_s3_bucket.exports" "${PROJECT_NAME}-exports-${ENV}-${AWS_ACCOUNT_ID}" "Exports S3 bucket"
          import_resource "aws_s3_bucket.terraform_state" "${PROJECT_NAME}-terraform-state-${ENV}-${AWS_ACCOUNT_ID}" "Terraform state S3 bucket"
          import_resource "aws_dynamodb_table.terraform_state_lock" "${PROJECT_NAME}-terraform-state-lock-${ENV}" "DynamoDB table"
          import_resource "aws_db_subnet_group.main" "${PROJECT_NAME}-db-subnet-group-${ENV}" "DB subnet group"
          import_resource "aws_db_parameter_group.main" "${PROJECT_NAME}-postgres-${ENV}" "DB parameter group"
          
          # Import OIDC provider (with timeout)
          echo "  → Checking for OIDC provider..."
          OIDC_ARN=$(timeout 10 aws iam list-open-id-connect-providers --query "OpenIDConnectProviderList[?contains(Arn, 'token.actions.githubusercontent.com')].Arn" --output text 2>/dev/null | head -1)
          if [ -n "$OIDC_ARN" ]; then
            import_resource "aws_iam_openid_connect_provider.github" "$OIDC_ARN" "OIDC provider"
          else
            echo "    ⚠️  OIDC provider not found, will be created"
          fi
          
          # Verify what was actually imported
          echo ""
          echo "📊 Final state after imports:"
          terraform state list 2>/dev/null | head -30 || echo "  (no resources in state)"
          
          # Count imported resources
          IMPORTED_COUNT=$(terraform state list 2>/dev/null | wc -l || echo "0")
          echo "  Total resources in state: $IMPORTED_COUNT"
          
          # List the specific resources we tried to import
          echo ""
          echo "📋 Checking imported resources:"
          for resource in "aws_ecr_repository.app" "aws_iam_role.ecs_task_execution" "aws_iam_role.ecs_task" "aws_cloudwatch_log_group.ecs" "aws_s3_bucket.exports" "aws_s3_bucket.terraform_state" "aws_dynamodb_table.terraform_state_lock" "aws_db_subnet_group.main" "aws_db_parameter_group.main"; do
            if terraform state list 2>/dev/null | grep -q "^${resource}$"; then
              echo "  ✅ $resource"
            else
              echo "  ❌ $resource (NOT in state)"
            fi
          done
          
          echo ""
          echo "✅ Import step completed"
          
          # Step 2: Run terraform plan
          echo ""
          echo "🔍 Step 2: Running terraform plan..."
          terraform plan \
            -var-file="terraform.tfvars" \
            -out=tfplan || {
              echo "❌ Terraform plan failed"
              echo "Checking for common issues..."
              terraform validate || echo "Validation failed"
              exit 1
            }
          echo "✅ Terraform plan completed successfully"
          
          # Step 3: Apply changes (only on main branch)
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo ""
            echo "🚀 Step 3: Applying Terraform changes..."
            terraform apply -auto-approve tfplan || {
              echo "❌ Terraform apply failed"
              echo "Check the error messages above for details"
              exit 1
            }
            echo "✅ Terraform apply completed successfully"
          else
            echo ""
            echo "⏭️  Step 3: Skipping apply (not on main branch)"
          fi

      - name: Output Deployment Info
        if: github.ref == 'refs/heads/main'
        working-directory: ./infra/aws/terraform
        run: |
          echo "✅ Deployment completed!"
          echo ""
          echo "📋 Deployment Information:"
          terraform output -json || echo "⚠️  Some outputs may not be available"
          echo ""
          if terraform output -raw alb_dns_name > /dev/null 2>&1; then
            echo "🌐 ALB DNS: $(terraform output -raw alb_dns_name)"
          fi
          if terraform output -raw ecs_cluster_name > /dev/null 2>&1; then
            echo "📦 ECS Cluster: $(terraform output -raw ecs_cluster_name)"
          fi
          if terraform output -raw ecr_repository_url > /dev/null 2>&1; then
            echo "🐳 ECR Repository: $(terraform output -raw ecr_repository_url)"
          fi

