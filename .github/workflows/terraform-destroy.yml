name: Terraform Destroy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to destroy'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
      confirm:
        description: 'Type "DESTROY" to confirm destruction'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  destroy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Validate confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "DESTROY" ]; then
            echo "❌ Confirmation failed. You must type 'DESTROY' to proceed."
            exit 1
          fi
          echo "✅ Confirmation received. Proceeding with destruction..."

      - uses: actions/checkout@v4

      - name: Configure AWS credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
          role-session-name: GitHubActions-Destroy-${{ github.run_id }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.0

      - name: Create terraform.tfvars from example
        working-directory: ./infra/aws/terraform
        run: |
          if [ -f terraform.tfvars.example ]; then
            cp terraform.tfvars.example terraform.tfvars
          elif [ -f terraform.tfvars ]; then
            echo "Using existing terraform.tfvars"
          else
            echo "No tfvars file found, using defaults"
          fi
          terraform fmt terraform.tfvars 2>/dev/null || true

      - name: Terraform Init
        working-directory: ./infra/aws/terraform
        env:
          TF_VAR_github_repository: ${{ github.repository }}
          TF_VAR_environment: ${{ github.event.inputs.environment }}
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ENV="${{ github.event.inputs.environment }}"

          terraform init \
            -backend-config="bucket=import-export-orchestrator-terraform-state-${ENV}-${ACCOUNT_ID}" \
            -backend-config="key=terraform.tfstate" \
            -backend-config="region=us-east-1" \
            -backend-config="encrypt=true" \
            -backend-config="dynamodb_table=import-export-orchestrator-terraform-state-lock-${ENV}"

      - name: Terraform Plan Destroy
        working-directory: ./infra/aws/terraform
        env:
          TF_VAR_database_password: ${{ secrets.DATABASE_PASSWORD }}
          TF_VAR_github_repository: ${{ github.repository }}
          TF_VAR_environment: ${{ github.event.inputs.environment }}
        run: |
          echo "📝 Planning destruction..."
          terraform plan -destroy -out=tfplan-destroy

      - name: Terraform Destroy
        working-directory: ./infra/aws/terraform
        env:
          TF_VAR_database_password: ${{ secrets.DATABASE_PASSWORD }}
          TF_VAR_github_repository: ${{ github.repository }}
          TF_VAR_environment: ${{ github.event.inputs.environment }}
        run: |
          echo "💥 Destroying infrastructure..."
          terraform apply -auto-approve tfplan-destroy
          echo ""
          echo "✅ Infrastructure destroyed successfully"
